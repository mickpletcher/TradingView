# docker-compose.yml
version: "3.9"

services:
  webhook:
    build: .
    container_name: tv_alpaca_webhook
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tv_alpaca_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ~/.cloudflared:/home/nonroot/.cloudflared
    depends_on:
      - webhook
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}